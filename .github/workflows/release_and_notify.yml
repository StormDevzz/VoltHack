name: VoltHack CI/CD & Discord Notifier

on:
  push:
  issues:
    types: [opened, closed, reopened, edited]

jobs:
  build-and-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      # Step 3: Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Step 4: Compile/Build VoltHack and capture metrics
      - name: Compile VoltHack
        id: compile
        run: |
          echo "Starting compilation check..."
          START_TIME=$(date +%s)
          
          if ./gradlew build; then
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))
            echo "build_status=success" >> $GITHUB_OUTPUT
            echo "build_duration=$DURATION" >> $GITHUB_OUTPUT
            
            # Find the generated mod jar
            JAR_FILE=$(ls build/libs/*.jar 2>/dev/null | grep -v sources | grep -v slim | head -1 || true)
            if [ -f "$JAR_FILE" ]; then
              JAR_NAME=$(basename "$JAR_FILE")
              JAR_SIZE=$(du -h "$JAR_FILE" | cut -f1)
              echo "jar_name=$JAR_NAME" >> $GITHUB_OUTPUT
              echo "jar_size=$JAR_SIZE" >> $GITHUB_OUTPUT
            else
              echo "jar_name=Not Found" >> $GITHUB_OUTPUT
              echo "jar_size=N/A" >> $GITHUB_OUTPUT
            fi
            echo "Compilation Succeeded!"
          else
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))
            echo "build_status=failed" >> $GITHUB_OUTPUT
            echo "build_duration=$DURATION" >> $GITHUB_OUTPUT
            echo "Compilation Failed!"
            exit 1
          fi

      # Step 5: Manage Release (Delete existing, create new - runs ONLY on main/master push after compile success)
      - name: Manage Release
        if: (github.ref_name == 'main' || github.ref_name == 'master') && steps.compile.outputs.build_status == 'success'
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Starting Release Management..."
          
          # Extract version from properties
          VERSION=$(grep mod_version gradle.properties | cut -d= -f2 | tr -d ' ')
          TAG="volthack${VERSION//./}"
          JAR=$(ls build/libs/*.jar 2>/dev/null | grep -v sources | grep -v slim | head -1 || true)
          
          if [ -z "$JAR" ] || [ ! -f "$JAR" ]; then
            echo "Error: Compiled JAR not found!"
            echo "release_status=failed_no_jar" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "Version: $VERSION, Tag: $TAG, Jar: $JAR"
          
          # Delete existing release & tag to clean up previous versions
          DELETE_STATUS="skipped"
          if gh release delete "$TAG" --yes 2>/dev/null; then
            DELETE_STATUS="deleted/cleaned"
            echo "Deleted existing GitHub release for tag $TAG."
          fi
          if git push --delete origin "$TAG" 2>/dev/null; then
            DELETE_STATUS="deleted/cleaned"
            echo "Deleted remote git tag $TAG."
          fi
          echo "delete_status=$DELETE_STATUS" >> $GITHUB_OUTPUT
          
          # Create new release with compile artifact attached
          echo "Creating new release..."
          if gh release create "$TAG" "$JAR" --title "VoltHack $VERSION" --notes "VoltHack $VERSION" --latest; then
            echo "release_status=created" >> $GITHUB_OUTPUT
            echo "release_tag=$TAG" >> $GITHUB_OUTPUT
            echo "release_version=$VERSION" >> $GITHUB_OUTPUT
            echo "New Release Created Successfully!"
          else
            echo "release_status=failed_creation" >> $GITHUB_OUTPUT
            echo "Error: Failed to create GitHub release."
            exit 1
          fi

      # Step 6: Send Git push notification + Compilation + Release results to Discord (ALWAYS RUNS ON PUSH)
      - name: Send Push & CI/CD Notification to Discord
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.GIT_LOG }}
          COMPARE_URL: ${{ github.event.compare }}
          BRANCH: ${{ github.ref_name }}
          PUSHER: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          
          # Head commit fallback details
          HEAD_COMMIT_ID: ${{ github.event.head_commit.id }}
          HEAD_COMMIT_URL: ${{ github.event.head_commit.url }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
          HEAD_COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          
          # Compile status outputs
          BUILD_STATUS: ${{ steps.compile.outputs.build_status }}
          BUILD_DURATION: ${{ steps.compile.outputs.build_duration }}
          JAR_NAME: ${{ steps.compile.outputs.jar_name }}
          JAR_SIZE: ${{ steps.compile.outputs.jar_size }}
          
          # Release status outputs
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          DELETE_STATUS: ${{ steps.release.outputs.delete_status }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "GIT_LOG secret is not set. Skipping notification."
            exit 0
          fi
          
          REPO="${{ github.repository }}"
          
          # Sanitize compare and pusher URLs to avoid Discord 400 Bad Request on empty strings
          if [ -z "$COMPARE_URL" ] || [ "$COMPARE_URL" = "null" ] || [ "$COMPARE_URL" = "" ]; then
            COMPARE_URL="https://github.com/$REPO"
          fi
          if [ -z "$PUSHER" ] || [ "$PUSHER" = "null" ] || [ "$PUSHER" = "" ]; then
            PUSHER="github-actor"
          fi
          PUSHER_URL="https://github.com/$PUSHER"
          PUSHER_ICON="https://github.com/${PUSHER}.png"
          
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ] || [ "$BRANCH" = "" ]; then
            BRANCH="main"
          fi
          
          # Parse and format commits list safely
          COMMITS_JSON='${{ toJson(github.event.commits) }}'
          if [ "$COMMITS_JSON" = "null" ] || [ -z "$COMMITS_JSON" ] || [ "$COMMITS_JSON" = "[]" ]; then
            if [ -n "$HEAD_COMMIT_ID" ]; then
              SHORT_ID="${HEAD_COMMIT_ID:0:7}"
              SAFE_MSG=$(echo "$HEAD_COMMIT_MSG" | head -n 1)
              
              if [ -z "$HEAD_COMMIT_URL" ] || [ "$HEAD_COMMIT_URL" = "null" ] || [ "$HEAD_COMMIT_URL" = "" ]; then
                HEAD_COMMIT_URL="https://github.com/$REPO/commit/$HEAD_COMMIT_ID"
              fi
              
              COMMIT_LIST="- [\`$SHORT_ID\`]($HEAD_COMMIT_URL) $SAFE_MSG - **$HEAD_COMMIT_AUTHOR**"
              COMMIT_COUNT=1
            else
              COMMIT_LIST="No commit details available (branch/tag synchronization)."
              COMMIT_COUNT=0
            fi
          else
            COMMIT_LIST=$(echo "$COMMITS_JSON" | jq -r '.[] | "- [`" + .id[0:7] + "`](" + .url + ") " + (.message | split("\n")[0]) + " - **" + .author.name + "**"' 2>/dev/null || echo "No new commits.")
            COMMIT_COUNT=$(echo "$COMMITS_JSON" | jq 'length')
          fi
          
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="https://github.com/$REPO/actions/runs/$RUN_ID"
          
          # Format compile status info block dynamically
          if [ -z "$BUILD_STATUS" ]; then
            STATUS_STR="⚠️ SKIPPED (Setup Error)"
            ARTIFACT_STR="Build skipped due to setup/checkout environment failure."
            COLOR=16776960 # Volt Neon Yellow
          elif [ "$BUILD_STATUS" = "success" ]; then
            STATUS_STR="✅ SUCCESS (${BUILD_DURATION}s)"
            ARTIFACT_STR="📦 \`$JAR_NAME\` (${JAR_SIZE})"
            COLOR=3796756 # Volt Neon Green
          else
            STATUS_STR="❌ FAILED (${BUILD_DURATION}s)"
            ARTIFACT_STR="⚠️ Build failed, no artifact generated."
            COLOR=16724787 # Volt Neon Red
          fi
          
          # Format release status info block dynamically
          if [ "$RELEASE_OUTCOME" = "success" ]; then
            RELEASE_STR="🚀 RE-CREATED (\`$RELEASE_VERSION\` / \`$RELEASE_TAG\`)"
            if [ "$DELETE_STATUS" = "deleted/cleaned" ]; then
              RELEASE_STR="$RELEASE_STR (Existing old release cleaned up)"
            fi
          elif [ "$RELEASE_OUTCOME" = "failure" ]; then
            RELEASE_STR="❌ FAILED (Check Action Logs)"
            COLOR=16724787 # Volt Neon Red
          elif [ "$RELEASE_OUTCOME" = "skipped" ]; then
            if [ "$BUILD_STATUS" = "success" ]; then
              RELEASE_STR="⏭️ SKIPPED (Not main/master branch)"
            else
              RELEASE_STR="⏭️ SKIPPED (Compilation Failed)"
            fi
          else
            RELEASE_STR="⏭️ SKIPPED"
          fi
          
          PAYLOAD=$(jq -n \
            --arg title "New Push to $BRANCH ($COMMIT_COUNT Commits)" \
            --arg url "$COMPARE_URL" \
            --arg desc "$COMMIT_LIST" \
            --arg repo "$REPO" \
            --arg pusher "$PUSHER" \
            --arg pusher_url "$PUSHER_URL" \
            --arg pusher_icon "$PUSHER_ICON" \
            --arg status "$STATUS_STR" \
            --arg artifact "$ARTIFACT_STR" \
            --arg release "$RELEASE_STR" \
            --arg run_url "$RUN_URL" \
            --arg timestamp "$TIMESTAMP" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: $color,
                fields: [
                  { name: "Repository", value: $repo, inline: true },
                  { name: "Pusher", value: ("[" + $pusher + "](" + $pusher_url + ")"), inline: true },
                  { name: "Compilation Status", value: $status, inline: true },
                  { name: "Release Management", value: $release, inline: false },
                  { name: "Build Artifact", value: $artifact, inline: false },
                  { name: "GitHub Actions Run Logs", value: ("⚡ [View Workflow Run Logs](" + $run_url + ")"), inline: false }
                ],
                author: {
                  name: $pusher,
                  url: $pusher_url,
                  icon_url: $pusher_icon
                },
                footer: {
                  text: "VoltHack Logs & Build CI"
                },
                timestamp: $timestamp
              }]
            }')
            
          echo "Sending payload to Discord..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL")
          HTTP_STATUS=$(echo "$RESPONSE" | tr -d '\r' | tail -n 1 | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "Discord API Response Body:"
          echo "$BODY"
          echo "HTTP Status Code: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Error: Discord Webhook rejected the request with status code $HTTP_STATUS"
            exit 1
          fi

  issues-notify:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Send Issue Discord Embed
        env:
          WEBHOOK_URL: ${{ secrets.GIT_ISSUES }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_ACTION: ${{ github.event.action }}
          ISSUE_CREATOR: ${{ github.event.issue.user.login }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "GIT_ISSUES secret is not set. Skipping notification."
            exit 0
          fi
          
          REPO="${{ github.repository }}"
          
          # Sanitize URL arguments
          if [ -z "$ISSUE_URL" ] || [ "$ISSUE_URL" = "null" ] || [ "$ISSUE_URL" = "" ]; then
            ISSUE_URL="https://github.com/$REPO/issues"
          fi
          if [ -z "$ISSUE_CREATOR" ] || [ "$ISSUE_CREATOR" = "null" ] || [ "$ISSUE_CREATOR" = "" ]; then
            ISSUE_CREATOR="github-actor"
          fi
          CREATOR_URL="https://github.com/$ISSUE_CREATOR"
          CREATOR_ICON="https://github.com/${ISSUE_CREATOR}.png"
          
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          if [ "$ISSUE_ACTION" = "opened" ]; then
            COLOR=3796756 # Volt Neon Green
          elif [ "$ISSUE_ACTION" = "closed" ]; then
            COLOR=16724787 # Volt Neon Red
          elif [ "$ISSUE_ACTION" = "reopened" ]; then
            COLOR=65535 # Volt Neon Cyan
          else
            COLOR=16776960 # Volt Yellow
          fi
          
          TRUNCATED_BODY=$(echo "$ISSUE_BODY" | head -c 800)
          if [ "${#ISSUE_BODY}" -gt 800 ]; then
            TRUNCATED_BODY="${TRUNCATED_BODY}..."
          fi
          
          PAYLOAD=$(jq -n \
            --arg title "Issue #$ISSUE_NUMBER: $ISSUE_TITLE" \
            --arg url "$ISSUE_URL" \
            --arg desc "$TRUNCATED_BODY" \
            --arg repo "$REPO" \
            --arg creator "$ISSUE_CREATOR" \
            --arg creator_url "$CREATOR_URL" \
            --arg creator_icon "$CREATOR_ICON" \
            --arg action "$ISSUE_ACTION" \
            --arg timestamp "$TIMESTAMP" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: $color,
                fields: [
                  { name: "Repository", value: $repo, inline: true },
                  { name: "Creator", value: ("[" + $creator + "](" + $creator_url + ")"), inline: true },
                  { name: "Action", value: ($action | ascii_upcase), inline: true }
                ],
                author: {
                  name: $creator,
                  url: $creator_url,
                  icon_url: $creator_icon
                },
                footer: {
                  text: "VoltHack Git Issues"
                },
                timestamp: $timestamp
              }]
            }')
            
          echo "Sending payload to Discord..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL")
          HTTP_STATUS=$(echo "$RESPONSE" | tr -d '\r' | tail -n 1 | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "Discord API Response Body:"
          echo "$BODY"
          echo "HTTP Status Code: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Error: Discord Webhook rejected the request with status code $HTTP_STATUS"
            exit 1
          fi
